<div class="bg-white rounded-3xl p-8 max-w-md w-full">
    <h2 class="text-2xl font-bold mb-6">تسک جدید</h2>
    <form hx-post="{% url 'projects_htmx:add_task' project.id %}" class="space-y-4">
        <input type="text" name="title" placeholder="عنوان تسک" class="w-full p-4 border rounded-2xl" required>
        <select name="column_id" class="w-full p-4 border rounded-2xl">
            {% for column in columns %}
            <option value="{{ column.id }}">{{ column.name }}</option>
            {% endfor %}
        </select>
        <textarea name="description" placeholder="توضیحات" class="w-full p-4 border rounded-2xl h-24"></textarea>
        
        <div class="flex gap-3">
            <button type="button" onclick="closeModal()" class="flex-1 py-4 border rounded-2xl">انصراف</button>
            <button type="submit" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl">ایجاد تسک</button>
        </div>
    </form>
</div>
