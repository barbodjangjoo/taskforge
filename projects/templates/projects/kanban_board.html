{% extends 'base.html' %} {% block title %}{{ project.name }} - TaskForge{%
endblock %} {% block content %}
<div class="h-screen flex flex-col">
  <!-- Header -->
  <div class="bg-white border-b px-8 py-4 flex justify-between items-center">
    <div class="flex items-center gap-4">
      <button
        onclick="window.history.back()"
        class="text-gray-500 hover:text-gray-700"
      >
        ← بازگشت
      </button>
      <h1 class="text-2xl font-bold">{{ project.name }}</h1>
    </div>
    <div class="flex items-center gap-4">
      <button
        onclick="addNewColumn()"
        class="bg-gray-100 hover:bg-gray-200 px-5 py-2 rounded-xl text-sm font-medium"
      >
        + ستون جدید
      </button>
    </div>
  </div>

  <!-- Kanban Board -->
  <div class="flex-1 p-6 overflow-x-auto">
    <div class="flex gap-6 h-full min-w-max" id="kanban-board">
      <!-- ستون‌ها با HTMX اینجا لود می‌شن -->
      <p class="text-gray-400 m-auto">در حال بارگذاری بورد...</p>
    </div>
  </div>
</div>
{% endblock %}
