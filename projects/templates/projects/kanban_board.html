{% extends 'base.html' %}

{% block title %}{{ project.name }} - TaskForge{% endblock %}

{% block content %}
<div class="h-screen flex flex-col bg-gray-50">
    <!-- Header -->
    <div class="bg-white border-b px-8 py-5 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" 
                    class="text-gray-500 hover:text-gray-700 text-3xl">←</button>
            <div>
                <h1 class="text-3xl font-bold text-gray-800">{{ project.name }}</h1>
                <p class="text-sm text-gray-500">بورد اصلی</p>
            </div>
        </div>
        
        <div class="flex gap-3">
            <button hx-get="{% url 'projects_htmx:add_column_form' project.id %}" 
                    hx-target="#modal"
                    hx-swap="innerHTML"
                    class="bg-white border border-gray-300 hover:bg-gray-50 px-5 py-2.5 rounded-2xl text-sm font-medium flex items-center gap-2">
                <span class="text-xl leading-none">+</span> ستون جدید
            </button>
            
            <button hx-get="{% url 'projects_htmx:add_task_form' project.id %}" 
                    hx-target="#modal"
                    hx-swap="innerHTML"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-2xl text-sm font-medium flex items-center gap-2">
                <span class="text-xl leading-none">+</span> تسک جدید
            </button>
        </div>
    </div>

    <!-- Kanban Board -->
    <div class="flex-1 p-6 overflow-x-auto">
        <div class="flex gap-6 h-full min-w-max" id="kanban-columns">
            {% for column in columns %}
            <div class="bg-white rounded-3xl shadow w-80 flex-shrink-0 h-full flex flex-col border border-gray-100">
                <!-- Column Header -->
                <div class="p-5 border-b font-semibold text-gray-700 flex justify-between items-center bg-gray-50 rounded-t-3xl">
                    <span>{{ column.name }}</span>
                    <span class="text-xs bg-gray-200 px-2.5 py-1 rounded-full">{{ column.task_set.count }}</span>
                </div>
                
                <!-- Tasks Container -->
                <div class="flex-1 p-4 space-y-3 overflow-y-auto min-h-0" id="column-{{ column.id }}">
                    <!-- تسک‌ها با HTMX اینجا لود می‌شن -->
                </div>
                
                <!-- Add Task Button -->
                <div class="p-4 border-t">
                    <button hx-get="{% url 'projects_htmx:add_task_form' project.id %}?column_id={{ column.id }}" 
                            hx-target="#modal"
                            class="w-full py-3 text-sm text-blue-600 hover:bg-blue-50 rounded-2xl border border-dashed border-blue-200">
                        + تسک جدید
                    </button>
                </div>
            </div>
            {% empty %}
            <div class="m-auto text-center">
                <p class="text-gray-400 text-xl mb-4">هنوز ستونی ساخته نشده</p>
                <button hx-get="{% url 'projects_htmx:add_column_form' project.id %}" 
                        hx-target="#modal"
                        class="bg-white border-2 border-dashed border-gray-300 hover:border-gray-400 px-8 py-6 rounded-3xl text-gray-500">
                    اولین ستون خودت رو بساز
                </button>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<!-- Modal Container -->
<div id="modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50"></div>
{% endblock %}
