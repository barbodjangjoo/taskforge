{% extends 'base.html' %}

{% block title %}{{ project.name }} - TaskForge{% endblock %}

{% block content %}
<div class="h-screen flex flex-col bg-gray-100">
    <!-- Header -->
    <div class="bg-white border-b px-8 py-5 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" 
                    class="text-gray-500 hover:text-gray-700 text-2xl">←</button>
            <h1 class="text-3xl font-bold text-gray-800">{{ project.name }}</h1>
        </div>
        
        <div class="flex gap-3">
            <button onclick="addNewColumn()" 
                    class="bg-white border border-gray-300 hover:bg-gray-50 px-5 py-2.5 rounded-2xl text-sm font-medium">
                + ستون جدید
            </button>
            <button onclick="addNewTask()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-2xl text-sm font-medium">
                + تسک جدید
            </button>
        </div>
    </div>

    <!-- Kanban Area -->
    <div class="flex-1 p-6 overflow-x-auto">
        <div class="flex gap-6 h-full" id="kanban-columns">
            {% for column in columns %}
            <div class="bg-white rounded-3xl shadow w-80 flex-shrink-0 h-full flex flex-col">
                <div class="p-5 border-b font-semibold text-gray-700">
                    {{ column.name }}
                </div>
                <div class="flex-1 p-4 space-y-3 overflow-y-auto">
                    <!-- تسک‌ها اینجا لود می‌شن -->
                </div>
            </div>
            {% empty %}
            <p class="m-auto text-gray-400">هنوز ستونی ساخته نشده. ستون جدید بساز.</p>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
