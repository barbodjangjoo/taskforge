{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-10">
        <h2 class="text-3xl font-bold text-center mb-8">ورود به TaskForge</h2>
        
        {% if error %}
        <p class="text-red-500 text-center mb-4">{{ error }}</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="email" name="email" placeholder="ایمیل" required class="w-full p-4 border rounded-2xl mb-4">
            <input type="password" name="password" placeholder="رمز عبور" required class="w-full p-4 border rounded-2xl mb-6">
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-medium">ورود</button>
        </form>
    </div>
</div>
{% endblock %}
